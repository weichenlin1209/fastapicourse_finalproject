<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Club</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header>
      <div class="header-inner">
        <div class="header-logo">
          <div class="logo-icon">🎵</div>
          <h1>Music Club</h1>
        </div>
        <nav>
          <button class="nav-btn active" data-view="announcements">📢 公告</button>
          <button class="nav-btn auth-only hidden" data-view="proposals">🎸 歌曲提案</button>
          <button class="nav-btn auth-only hidden" data-view="bookings">📅 預約場地</button>
          <button class="nav-btn auth-only officer-only hidden" data-view="users">👥 成員管理</button>
        </nav>
        <div class="header-right">
          <span id="user-info" class="hidden"></span>
          <button id="login-btn" class="btn-primary btn-sm">登入</button>
          <button id="logout-btn" class="btn-secondary btn-sm hidden">登出</button>
        </div>
      </div>
    </header>

    <!-- Login Modal -->
    <div id="login-modal" class="modal-overlay hidden">
      <div class="modal card">
        <h2>🎵 歡迎回來</h2>
        <form id="login-form">
          <label>帳號
            <input type="text" name="username" id="login-username" required placeholder="請輸入帳號">
          </label>
          <label>密碼
            <input type="password" name="password" id="login-password" required placeholder="請輸入密碼">
          </label>
          <button type="submit" class="btn-primary" style="width:100%;justify-content:center;margin-top:0.25rem">登入</button>
          <p id="login-error" class="error" aria-live="polite"></p>
        </form>
      </div>
    </div>

    <!-- Password Reset Modal -->
    <div id="password-reset-modal" class="modal-overlay hidden">
      <div class="modal card">
        <h2>🔐 設定新密碼</h2>
        <p>管理員要求您在繼續使用前設定新密碼。</p>
        <form id="password-reset-form">
          <label>目前密碼
            <input type="password" name="old_password" id="reset-old-password" required placeholder="請輸入目前密碼">
          </label>
          <label>新密碼 <small>（至少 8 個字元）</small>
            <input type="password" name="new_password" id="reset-new-password" required minlength="8" placeholder="請輸入新密碼">
          </label>
          <button type="submit" class="btn-primary" style="width:100%;justify-content:center;margin-top:0.25rem">確認變更</button>
          <p id="reset-error" class="error" aria-live="polite"></p>
          <p id="reset-success" class="success hidden" aria-live="polite"></p>
        </form>
      </div>
    </div>

    <!-- Main Content -->
    <main id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>載入中…</p>
      </div>
    </main>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
